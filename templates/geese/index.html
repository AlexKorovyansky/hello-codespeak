<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funny Geese Demo 🪿</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      overflow: hidden;
      user-select: none;
    }

    .goose {
      position: absolute;
      cursor: pointer;
      line-height: 1;
      transform-origin: center center;
      transition: font-size 0.15s ease;
      will-change: transform;
    }

    @keyframes tumble {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pop {
      0%   { transform: scale(1);   opacity: 1; }
      60%  { transform: scale(1.6); opacity: 0.8; }
      100% { transform: scale(0);   opacity: 0; }
    }

    .goose.popping {
      animation: pop 0.4s ease-out forwards;
      pointer-events: none;
    }

    /* hint text */
    #hint {
      pointer-events: none;
    }

    /* speed slider panel */
    #speed-panel {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 100;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(6px);
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      user-select: none;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 6px;
      border-radius: 3px;
      background: #bae6fd;
      outline: none;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0284c7;
      cursor: pointer;
      transition: background 0.15s;
    }

    #speed-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0284c7;
      cursor: pointer;
      border: none;
    }

    #speed-slider::-webkit-slider-thumb:hover,
    #speed-slider::-moz-range-thumb:hover {
      background: #0369a1;
    }

    /* leaderboard panel */
    #leaderboard {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 100;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.13);
      min-width: 220px;

    }

    #leaderboard h2 {
      font-size: 0.85rem;

    .lb-row {
      display: flex;

    .lb-row:last-child {

    .lb-row.me {

  </style>
</head>
<body class="w-screen h-screen bg-sky-100 select-none">

  <p id="hint" class="absolute inset-0 flex items-center justify-center text-sky-300 text-2xl font-semibold tracking-wide opacity-60">
    Click anywhere to add a goose 🪿
  </p>

  <!-- Leaderboard (top-right) -->
  <div id="leaderboard">
    <h2>🏆 Leaderboard</h2>
    <div id="lb-body">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Speed slider (bottom-right) -->
  <div id="speed-panel">
    <span style="font-size:1.1rem;" title="Slower">🐢</span>
    <input id="speed-slider" type="range" min="0" max="100" value="50" />
    <span style="font-size:1.1rem;" title="Faster">🐇</span>
  </div>

  <script>
    // ─── Player identity (injected by Django) ─────────────────────────────────
    const MY_NAME   = "{{ player.name|escapejs }}";
    const MY_AVATAR = "{{ player.avatar|escapejs }}";

    // ─── Config ──────────────────────────────────────────────────────────────
    const BASE_SIZE     = 48;   // px — "medium" starting size
    const SIZE_STEP     = 18;   // px per click
    const MAX_SIZE      = 120;  // px — threshold to trigger pop
    const BASE_SPEED    = 2.5;  // px per frame
    const TUMBLE_SPEED  = 220;  // ms per full rotation (base)

    // ─── Speed multiplier (slider) ────────────────────────────────────────────
    function sliderToMultiplier(v) {
      return 0.1 * Math.pow(30, v / 100);
    }

    let speedMultiplier = sliderToMultiplier(50);

    const speedSlider = document.getElementById('speed-slider');
    speedSlider.addEventListener('input', () => {
      speedMultiplier = sliderToMultiplier(Number(speedSlider.value));
    });
    speedSlider.addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('speed-panel').addEventListener('click', (e) => e.stopPropagation());
    document.getElementById('leaderboard').addEventListener('click', (e) => e.stopPropagation());

    // ─── State ───────────────────────────────────────────────────────────────
    const geese = [];
    let   nextId = 0;

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function rand(min, max) { return Math.random() * (max - min) + min; }

    function randomDirection() {
      const angle = rand(0, Math.PI * 2);
      return { vx: Math.cos(angle), vy: Math.sin(angle) };
    }

    // ─── API calls ───────────────────────────────────────────────────────────
    function postEvent(endpoint) {
      fetch(endpoint, { method: 'POST' }).catch(() => {});
    }

    // ─── Create a goose ──────────────────────────────────────────────────────
    function createGoose(x, y) {
      const id = nextId++;
      const { vx, vy } = randomDirection();
      const speed = rand(BASE_SPEED * 0.7, BASE_SPEED * 1.4);

      const el = document.createElement('span');
      el.classList.add('goose');
      el.textContent = '🪿';
      el.dataset.id  = id;

      const goose = {
        id,
        el,
        x: x - BASE_SIZE / 2,
        y: y - BASE_SIZE / 2,
        baseVx: vx * speed,
        baseVy: vy * speed,
        dirX: vx >= 0 ? 1 : -1,
        dirY: vy >= 0 ? 1 : -1,
        size: BASE_SIZE,
        angle: rand(0, 360),
        rotSpeed: rand(-3, 3) || 2,
      };

      applyStyle(goose);
      document.body.appendChild(el);
      geese.push(goose);

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        growGoose(goose);
      });

      document.getElementById('hint').style.display = 'none';

      // Report to backend
      postEvent('/api/goose-created/');

      return goose;
    }

    function applyStyle(goose) {
      const el = goose.el;
      el.style.fontSize  = goose.size + 'px';
      el.style.left      = goose.x + 'px';
      el.style.top       = goose.y + 'px';
      const dur = TUMBLE_SPEED + goose.size * 3;
      el.style.animation = `tumble ${dur}ms linear infinite`;
      if (goose.rotSpeed < 0) {
        el.style.animationDirection = 'reverse';
      } else {
        el.style.animationDirection = 'normal';
      }
    }

    // ─── Grow / pop ──────────────────────────────────────────────────────────
    function growGoose(goose) {
      goose.size += SIZE_STEP;
      if (goose.size >= MAX_SIZE) {
        popGoose(goose);
      } else {
        applyStyle(goose);
      }
    }

    function popGoose(goose) {
      const el = goose.el;
      const idx = geese.indexOf(goose);
      if (idx !== -1) geese.splice(idx, 1);

      el.style.animation = '';
      el.style.animationDirection = '';
      void el.offsetWidth;

      el.classList.add('popping');
      el.addEventListener('animationend', () => el.remove(), { once: true });

      if (geese.length === 0) {
        document.getElementById('hint').style.display = '';
      }

      // Report to backend
      postEvent('/api/goose-popped/');
    }

    // ─── Animation loop ───────────────────────────────────────────────────────
    function tick() {
      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const g of geese) {
        const vx = g.baseVx * g.dirX * speedMultiplier;
        const vy = g.baseVy * g.dirY * speedMultiplier;

        g.x += vx;
        g.y += vy;

        if (g.x <= 0) {
          g.x = 0;
          g.dirX = 1;
        } else if (g.x + g.size >= W) {
          g.x = W - g.size;
          g.dirX = -1;
        }

        if (g.y <= 0) {
          g.y = 0;
          g.dirY = 1;
        } else if (g.y + g.size >= H) {
          g.y = H - g.size;
          g.dirY = -1;
        }

        g.el.style.left = g.x + 'px';
        g.el.style.top  = g.y + 'px';
      }

      requestAnimationFrame(tick);
    }

    // ─── Click on background → new goose ─────────────────────────────────────
    document.body.addEventListener('click', (e) => {
      if (e.target === document.body || e.target.id === 'hint') {
        createGoose(e.clientX, e.clientY);
      }
    });

    // ─── Leaderboard polling ─────────────────────────────────────────────────
    function renderLeaderboard(players) {
      const container = document.getElementById('lb-body');
      if (!players.length) {
        container.innerHTML = '<div style="font-size:0.78rem;color:#94a3b8;text-align:center;padding:0.4rem 0;">No players yet</div>';
        return;
      }
      container.innerHTML = players.map(p => {
        const isMe = (p.name === MY_NAME && p.avatar === MY_AVATAR);
        return `<div class="lb-row${isMe ? ' me' : ''}">
          <span class="lb-avatar">${p.avatar}</span>
          <span class="lb-name">${escHtml(p.name)}${isMe ? ' (you)' : ''}</span>
          <span class="lb-stats">🪿${p.geese_created} 🎉${p.geese_popped}</span>
        </div>`;
      }).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function pollStats() {
      try {
        const res = await fetch('/api/stats/');
        if (res.ok) {
          const data = await res.json();
          renderLeaderboard(data.players);
        }
      } catch (_) {}
      setTimeout(pollStats, 2000);
    }

    // ─── Start ───────────────────────────────────────────────────────────────
    requestAnimationFrame(tick);
    pollStats();
  </script>
</body>
</html>
